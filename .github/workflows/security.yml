name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '27 3 * * 1'

permissions:
  contents: read

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  dependency-audit:
    name: Security / dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
      - name: Setup pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        run: pnpm run security

  secret-scan:
    name: Security / secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: Scan for secrets
        run: |
          "$HOME/go/bin/gitleaks" detect --source . --redact --exit-code 1

  codeql:
    name: Security / CodeQL
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          languages: javascript-typescript
      - name: Analyze
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e
